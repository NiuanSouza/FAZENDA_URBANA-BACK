spring.application.name=CityGreen

# ===============================
# CONFIGURAúíES DO SQL SERVER
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=city_green;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=CityGreen123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# CONFIGURAúíES DO HIBERNATE/JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true

# ===============================
# CONFIGURAúíES DO FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# CONFIGURAúíES DE SEGURANúA (JWT)
# ===============================
api.security.token.secret=${JWT_SECRET:citygreen-secret-123-portfolio}